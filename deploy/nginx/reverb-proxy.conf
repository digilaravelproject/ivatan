# ============================================================
# Nginx Reverse Proxy for Laravel Reverb (WebSocket SSL)
# ============================================================
# Add these blocks inside your main server {} block in
# /etc/nginx/sites-available/your-domain.conf
#
# How it works:
#   - Client connects via wss://yourdomain.com/app (SSL)
#   - Nginx proxies to Reverb running on localhost:8080 (HTTP)
#   - This way Reverb doesn't need its own SSL certificate
# ============================================================

# For Pusher-compatible WebSocket connections
location /app {
    proxy_pass http://0.0.0.0:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}

# For Reverb apps endpoint (HTTP API)
location /apps {
    proxy_pass http://0.0.0.0:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
